name: Auto-update events from PagTickets

on:
  schedule:
    # A cada 5 minutos (GitHub não permite menor que isso)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # botão "Run workflow" no GitHub pra rodar manual

# Permissões: só o necessário pra commitar no próprio repo
permissions:
  contents: write

# Cancela runs anteriores se um novo dispara (evita backlog em downtime)
concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run update_events.py
        env:
          # Token do próprio Actions tem permissão de push no mesmo repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_FILE: events.json
          GITHUB_BRANCH: main
          PYTHONIOENCODING: utf-8
        run: python update_events.py

      - name: Commit changes if any (backup, com retry)
        # update_events.py já pusha via API atômica. Este step é defesa em
        # profundidade caso a API falhe. Sem o pull --rebase, race com o
        # mesa-scraper (que pusha occupied-tables.json em paralelo) faz o
        # push ser rejeitado e o workflow inteiro falhar.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.json || true
          if git diff --cached --quiet; then
            echo "Nenhuma mudança local detectada — provavelmente API push do update_events.py já cuidou."
            exit 0
          fi
          git commit -m "events: auto-update from PagTickets [skip ci]"
          for attempt in 1 2 3 4 5; do
            git pull --rebase --no-edit origin main || true
            if git push origin main; then
              echo "✅ Push ok no attempt $attempt"
              exit 0
            fi
            echo "⚠️ Push rejeitado no attempt $attempt — alguém pushou em paralelo. Retry em ${attempt}s..."
            sleep $attempt
          done
          echo "❌ Falhou após 5 tentativas. Ignorando — update_events.py provavelmente pushou via API."
          exit 0
